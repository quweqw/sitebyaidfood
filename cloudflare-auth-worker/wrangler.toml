workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "aifood-auth"
database_id = "c1214f56-4b1a-41cc-874b-caf3d4987c02"
migrations_dir = "migrations"

[vars]
ENVIRONMENT = "production"
APP_NAME = "AI Food"
ALLOWED_ORIGINS = "https://cremenality.ru,https://www.cremenality.ru,https://cremenality.pages.dev,https://cremenality.online,https://www.cremenality.online,http://127.0.0.1:5178,http://localhost:5178"
