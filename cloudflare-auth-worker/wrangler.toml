REFRESH_COOKIE_NAME = "__Host-aifood_refresh"
COOKIE_SECURE = "true"
COOKIE_SAMESITE = "None"
ACCESS_TOKEN_EXPIRE_MINUTES = "60"
REFRESH_TOKEN_EXPIRE_DAYS = "30"
